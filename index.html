<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="VetCare"/>
  <meta name="theme-color" content="#1A3A5C"/>
  <title>VetCare - Sistema Veterinario</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600&display=swap"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
  <script>
window.onerror = function(msg, src, line, col, err) {
  var ld = document.getElementById("loading");
  if(ld) ld.innerHTML = "<div style='padding:30px;font-family:monospace;font-size:13px'><b style='color:red'>ERROR JS:</b><br>" + msg + "<br><small>" + (src||"") + ":" + line + ":" + col + "</small><br><pre style='font-size:11px;color:#333;white-space:pre-wrap;max-height:300px;overflow:auto'>" + (err&&err.stack||"") + "</pre></div>";
  return false;
};
window.addEventListener("unhandledrejection", function(e) {
  var ld = document.getElementById("loading");
  if(ld) ld.innerHTML = "<div style='padding:30px;font-family:monospace;font-size:13px'><b style='color:red'>PROMISE ERROR:</b><br>" + (e.reason&&(e.reason.message||String(e.reason))||"unknown") + "<br><pre style='font-size:11px;color:#333;white-space:pre-wrap'>" + (e.reason&&e.reason.stack||"") + "</pre></div>";
});
  </script>
</head>
<body>
  <div id="loading">
    <p style="font-family:sans-serif;padding:40px;text-align:center">Cargando VetCare...</p>
  </div>
  <div id="root"></div>
  <script>
var useState=React.useState,useEffect=React.useEffect,useCallback=React.useCallback,useMemo=React.useMemo;
console.log("VetCare: script normal OK, React:", typeof React, "useState:", typeof useState);
  </script>
  <script type="text/babel" data-presets="react" data-type="script">
function TestApp() {
  return <div style={{padding:40,fontFamily:"sans-serif",textAlign:"center"}}><h2 style={{color:"green"}}>Babel OK - React funciona</h2><p>El problema era otro. Recargando app completa...</p></div>;
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TestApp));
  document.getElementById("loading").style.display = "none";
} catch(err) {
  document.getElementById("loading").innerHTML = "<div style='padding:30px;font-family:monospace;font-size:13px'><b style='color:red'>RENDER ERROR:</b><br>" + err.message + "<br><pre>" + err.stack + "</pre></div>";
}
  </script>
</body>
</html>
