        if(sid){var su=byId(u,sid);if(su){setUser(su);setTab(su.role==="admin"?"dashboard":su.role==="vet"?"dashboard":"mypets");}}
      }catch(e){console.error("init error",e);}
      finally{clearTimeout(_t);setReady(true);}
    })();
  },[]);
  function handleLogin(u,allUsers){setUsers(allUsers);setUser(u);setTab(u.role==="admin"?"dashboard":u.role==="vet"?"dashboard":"mypets");}
  async function handleLogout(){await sSet(KEYS.session,null);setUser(null);setTab("");setModal(null);}
  function markRead(ids){setNotifs(function(prev){var next=prev.map(function(n){return ids.indexOf(n.id)>=0?Object.assign({},n,{read:true}):n;});sSet(KEYS.notifs,next);return next;});}
  async function savePet(f){var np=existing?pets.map(function(x){return x.id===f.id?f:x;}):(pets||[]).concat([f]);var existing=pets.find(function(x){return x.id===f.id;});np=existing?pets.map(function(x){return x.id===f.id?f:x;}):(pets||[]).concat([f]);await sSet(KEYS.pets,np);setPets(np);setModal(null);push("Paciente guardado");}
  async function deletePet(id){var np=pets.filter(function(x){return x.id!==id;});await sSet(KEYS.pets,np);setPets(np);push("Paciente eliminado","warning");}
  async function saveRecord(f){var existingR=records.find(function(x){return x.id===f.id;});var nr=existingR?records.map(function(x){return x.id===f.id?f:x;}):records.concat([f]);await sSet(KEYS.records,nr);setRecords(nr);setModal(null);push("Historia guardada");}
  async function deleteRecord(id){var nr=records.filter(function(x){return x.id!==id;});await sSet(KEYS.records,nr);setRecords(nr);push("Historia eliminada","warning");}
  async function saveAppt(f){var existingA=appointments.find(function(x){return x.id===f.id;});var na=existingA?appointments.map(function(x){return x.id===f.id?f:x;}):appointments.concat([f]);await sSet(KEYS.appts,na);setAppointments(na);setModal(null);push("Cita guardada");}
  async function cancelAppt(a){var na=appointments.map(function(x){return x.id===a.id?Object.assign({},x,{status:"cancelled"}):x;});await sSet(KEYS.appts,na);setAppointments(na);push("Cita cancelada","warning");}
  async function changePassword(newPwd){if(!user)return;var nu=users.map(function(x){return x.id===user.id?Object.assign({},x,{password:newPwd}):x;});await sSet(KEYS.users,nu);setUsers(nu);setUser(Object.assign({},user,{password:newPwd}));push("Contraseña actualizada");}
  async function saveSurgery(s){var existingS=surgeries.find(function(x){return x.id===s.id;});var ns=existingS?surgeries.map(function(x){return x.id===s.id?s:x;}):surgeries.concat([s]);setSurgeries(ns);try{localStorage.setItem("vc_surgeries",JSON.stringify(ns));}catch(e){}setSurgeryModal(null);push("Cirugía guardada");}
  async function deleteSurgery(id){var ns=surgeries.filter(function(x){return x.id!==id;});setSurgeries(ns);try{localStorage.setItem("vc_surgeries",JSON.stringify(ns));}catch(e){}push("Cirugía eliminada","warning");}
  async function updateRecord(updated){var nr=records.map(function(x){return x.id===updated.id?updated:x;});await sSet(KEYS.records,nr);setRecords(nr);}
  async function saveClinicalRecord(record,apptId){var existingR=records.find(function(x){return x.id===record.id;});var nr=existingR?records.map(function(x){return x.id===record.id?record:x;}):records.concat([record]);await sSet(KEYS.records,nr);setRecords(nr);if(apptId){var na=appointments.map(function(x){return x.id===apptId?Object.assign({},x,{status:"confirmed",attended:true}):x;});await sSet(KEYS.appts,na);setAppointments(na);}setClinicalModal(null);push("Nota clínica guardada");}
  var isAdmin=user&&user.role==="admin";
  var isVet=user&&user.role==="vet";
  var isOwner=user&&user.role==="owner";
  var owners=users.filter(function(u){return u.role==="owner"||u.role==="vet"||u.role==="admin";});
  var ownerPets=isOwner?pets.filter(function(p){return p.ownerId===user.id;}):[];
  var blockedList=blockedDays.map(function(b){return b.date;});
  var calProps={pets:pets,users:users,appointments:appointments,blockedDays:blockedDays,onAdd:function(){setModal({type:"apptForm",data:null});},C:C};
  if(!ready)return(<div><style>{buildCss(palette(false))}</style><div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F0F4F8",gap:16}}><div style={{fontSize:48}}>🐾</div><div style={{fontSize:14,color:"#4A6275",fontFamily:"sans-serif"}}>Cargando VetCare...</div></div></div>);
  if(!user)return(<div><style>{buildCss(C)}</style><AuthScreen onLogin={handleLogin} C={C}/></div>);
  return(
    <div>
      <style>{buildCss(C)}</style>
      <Toast toasts={toasts} C={C}/>
      <Shell user={user} tab={tab} setTab={function(t){setTab(t);setSelPet(null);setModal(null);}} onLogout={handleLogout} onChangePassword={function(){setShowChangePwd(true);}} notifications={notifs} onMarkRead={markRead} onNotifAction={function(){}} C={C}>
        {isAdmin&&tab==="dashboard"&&<Dashboard pets={pets} records={records} users={users} appointments={appointments} C={C}/>}
        {isAdmin&&tab==="users"&&<AdminUsersPanel users={users} setUsers={setUsers} push={push} C={C}/>}
        {isAdmin&&tab==="blocked"&&<BlockedPanel blockedDays={blockedDays} setBlockedDays={setBlockedDays} push={push} C={C}/>}
        {isAdmin&&tab==="surgeries"&&<SurgeriesList surgeries={surgeries} pets={pets} users={users} onAdd={function(){setSurgeryModal({data:null});}} onEdit={function(s){setSurgeryModal({data:s});}} onDelete={deleteSurgery} C={C}/>}
        {isAdmin&&tab==="calendar"&&<CalendarView {...calProps}/>}
        {isVet&&tab==="dashboard"&&<Dashboard pets={pets} records={records} users={users} appointments={appointments} C={C}/>}
        {isVet&&tab==="pets"&&<PatientsList pets={pets} users={users} records={records} onAdd={function(){setModal({type:"petForm",data:null});}} onEdit={function(p){setModal({type:"petForm",data:p});}} onDelete={deletePet} onCarnet={function(p){var own=byId(users,p.ownerId);setCarnetModal({pet:p,owner:own});}} C={C}/>}
        {isVet&&tab==="records"&&<RecordsList pets={pets} users={users} records={records} onAdd={function(){setModal({type:"recordForm",data:null});}} onEdit={function(r){setModal({type:"recordForm",data:r});}} onDelete={deleteRecord} onUpdateRecord={updateRecord} C={C}/>}
        {isVet&&tab==="surgeries"&&<SurgeriesList surgeries={surgeries} pets={pets} users={users} onAdd={function(){setSurgeryModal({data:null});}} onEdit={function(s){setSurgeryModal({data:s});}} onDelete={deleteSurgery} C={C}/>}
        {isVet&&tab==="calendar"&&<CalendarView {...calProps}/>}
        {isOwner&&tab==="mypets"&&<MyPets pets={ownerPets} records={records} surgeries={surgeries} onSelect={function(p){setSelPet(p);setTab("history");}} onCarnet={function(p){var own=byId(users,p.ownerId);setCarnetModal({pet:p,owner:own});}} C={C}/>}
        {isOwner&&tab==="history"&&<OwnerHistory pets={ownerPets} records={records} selectedPet={selPet} onSelectPet={setSelPet} onUpdateRecord={updateRecord} C={C}/>}
        {isOwner&&tab==="calendar"&&<CalendarView {...Object.assign({},calProps,{pets:ownerPets,apptReqs:apptReqs.filter(function(r){return r.ownerId===user.id;})})}/>}
      </Shell>
      {modal&&modal.type==="petForm"&&<PetForm owners={owners} existing={modal.data} onSave={savePet} onClose={function(){setModal(null);}} C={C} isOwner={isOwner}/>}
      {modal&&modal.type==="recordForm"&&<RecordForm pets={pets} users={users} vetId={user.id} existing={modal.data} onSave={saveRecord} onClose={function(){setModal(null);}} C={C}/>}
      {modal&&modal.type==="apptForm"&&<ApptForm pets={pets} owners={owners} existing={modal.data} allAppts={appointments} blockedDays={blockedList} onSave={saveAppt} onClose={function(){setModal(null);}} C={C} allowBlocked={isVet||isAdmin}/>}
      {pendingAppt&&<ApptActionModal appointment={pendingAppt} pets={pets} users={users} onConfirm={function(a){cancelAppt(a);}} onReject={function(a){cancelAppt(a);}} onClose={function(){setPendingAppt(null);}} C={C}/>}
      {showChangePwd&&user&&<ChangePasswordModal user={user} onSave={changePassword} onClose={function(){setShowChangePwd(false);}} C={C}/>}
      {surgeryModal&&<SurgeryForm pets={pets} users={users} vetId={user.id} existing={surgeryModal.data} onSave={saveSurgery} onClose={function(){setSurgeryModal(null);}} C={C}/>}
      {carnetModal&&<CarnetModal pet={carnetModal.pet} owner={carnetModal.owner} onClose={function(){setCarnetModal(null);}} C={C}/>}
      {clinicalModal&&<ClinicalNoteModal appointment={clinicalModal.appt} pet={clinicalModal.pet} vetId={user.id} existingRecord={clinicalModal.existingRecord} onSave={saveClinicalRecord} onClose={function(){setClinicalModal(null);}} C={C}/>}
    </div>
  );
}
try {
  ReactDOM.render(React.createElement(App), document.getElementById("root"));
  setTimeout(function(){
    var ld=document.getElementById("loading");
    if(ld){ld.classList.add("hide");setTimeout(function(){ld.style.display="none";},600);}
  }, 200);
} catch(err) {
  document.getElementById("loading").innerHTML = "<div style=\"padding:40px;text-align:center;font-family:sans-serif\"><h2 style=\"color:#c00\">Error VetCare</h2><pre style=\"font-size:12px;color:#333;white-space:pre-wrap\">"+err.message+"</pre></div>";
  console.error("VetCare render error:", err);
}
  </script>
</body>
</html>
