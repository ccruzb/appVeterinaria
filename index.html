<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="VetCare"/>
  <meta name="theme-color" content="#1A3A5C"/>
  <title>VetCare - Sistema Veterinario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600&display=swap"/>
  <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; }
#loading {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; background: #F0F4F8;
  gap: 12px; z-index: 9999; transition: opacity .6s;
}
#loading.hide { opacity: 0; pointer-events: none; }
.ld-paw { font-size: 52px; animation: ldpulse 1.4s ease-in-out infinite; }
.ld-title { font-size: 28px; font-weight: 800; color: #1A3A5C; font-family: 'Nunito', sans-serif; }
.ld-sub { font-size: 14px; color: #4A6275; }
.ld-bar { width: 180px; height: 4px; background: #CBD8E4; border-radius: 2px; overflow: hidden; margin-top: 8px; }
.ld-fill { height: 100%; background: #1E7A8C; border-radius: 2px; animation: ldbar 1.6s ease-in-out infinite; }
@keyframes ldpulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:.75} }
@keyframes ldbar { 0%{width:0%;margin-left:0} 50%{width:60%} 100%{width:0%;margin-left:100%} }
#root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="ld-paw">&#x1F43E;</div>
    <div class="ld-title">VetCare</div>
    <div class="ld-sub">Sistema de Gestión Veterinaria</div>
    <div class="ld-bar"><div class="ld-fill"></div></div>
  </div>
  <div id="root"></div>
  <script src="vetcare_helpers.js"></script>
  <script src="vetcare_c1.js"></script>
  <script src="vetcare_c2.js"></script>
  <script src="vetcare_c3.js"></script>
  <script src="vetcare_main.js"></script>
</body>
</html>
