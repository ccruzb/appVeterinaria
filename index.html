/* ============================================================
   VetCare - Estilos globales
   Los colores dinámicos se aplican via JS (palette.js)
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Nunito', sans-serif;
  -webkit-text-size-adjust: 100%;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--color-peach); }
::-webkit-scrollbar-thumb { background: var(--color-tan); border-radius: 3px; }

/* Form elements */
input, select, textarea {
  font-family: 'Nunito', sans-serif;
  border-radius: 10px;
  padding: 11px 14px;
  width: 100%;
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, select:focus, textarea:focus {
  box-shadow: 0 0 0 3px var(--color-brown-alpha);
}
input.err, select.err, textarea.err {
  border-color: var(--color-red) !important;
}

/* Buttons */
button {
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  transition: all .18s;
  -webkit-tap-highlight-color: transparent;
}
button:active { transform: scale(.97); }

/* Labels */
label {
  font-size: 13px;
  font-weight: 700;
  display: block;
  margin-bottom: 5px;
}

/* Animations */
@keyframes slideUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Loading screen */
#loading {
  position: fixed; inset: 0;
  background: #F0F4F8;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; transition: opacity .5s;
}
#loading.hide { opacity: 0; pointer-events: none; }
.ld-paw  { font-size: 72px; margin-bottom: 16px; animation: ldpulse 1.2s ease-in-out infinite; }
.ld-title { font-size: 30px; font-weight: 800; color: #1A3A5C; letter-spacing: 1px; }
.ld-sub  { font-size: 13px; color: #4A6275; margin-top: 6px; }
.ld-bar  { width: 160px; height: 3px; background: #CBD8E4; border-radius: 4px; margin-top: 18px; overflow: hidden; }
.ld-fill { height: 100%; background: #1E7A8C; border-radius: 4px; animation: ldbar 1.5s ease-in-out infinite; }

@keyframes ldpulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:.75} }
@keyframes ldbar   { 0%{width:0%;margin-left:0} 50%{width:60%} 100%{width:0%;margin-left:100%} }

/* Responsive */
#root { min-height: 100vh; }

function supaH() {
  return { "Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Prefer":"return=representation" };

// ─── MAPPERS snake_case ↔ camelCase ──────────────────────
function mapUser(r){ if(!r)return null; return {id:r.id,role:r.role,firstName:r.first_name,lastName:r.last_name,email:r.email,password:r.password,docType:r.doc_type||"DNI",docNum:r.doc_num||"",phone:r.phone||"",blocked:r.blocked||false}; }
function userToDb(u){ return {id:u.id,role:u.role,first_name:u.firstName||"",last_name:u.lastName||"",email:u.email,password:u.password,doc_type:u.docType||"DNI",doc_num:u.docNum||"",phone:u.phone||"",blocked:u.blocked||false}; }
function mapPet(r){ if(!r)return null; return {id:r.id,ownerId:r.owner_id,name:r.name,species:r.species||"Perro",breed:r.breed||"",sex:r.sex||"Macho",dob:r.dob||"",weight:r.weight||"",color:r.color||"",avatar:r.avatar||"🐾",photo:r.photo||""}; }
function petToDb(p){ return {id:p.id,owner_id:p.ownerId||p.owner_id,name:p.name,species:p.species||"Perro",breed:p.breed||"",sex:p.sex||"Macho",dob:p.dob||"",weight:p.weight||"",color:p.color||"",avatar:p.avatar||"🐾",photo:p.photo||""}; }
function mapRecord(r){ if(!r)return null; return {id:r.id,petId:r.pet_id,vetId:r.vet_id,date:r.date,type:r.type||"Consulta",diagnosis:r.diagnosis||"",treatment:r.treatment||"",notes:r.notes||"",nextVisit:r.next_visit||"",weight:r.weight||"",attended:r.attended,duration:r.duration,items:r.items||[]}; }
function recordToDb(r){ return {id:r.id,pet_id:r.petId||r.pet_id,vet_id:r.vetId||r.vet_id,date:r.date,type:r.type||"Consulta",diagnosis:r.diagnosis||"",treatment:r.treatment||"",notes:r.notes||"",next_visit:r.nextVisit||"",weight:r.weight||"",attended:r.attended!=null?r.attended:null,duration:r.duration||null,items:r.items||[]}; }
function mapAppt(r){ if(!r)return null; return {id:r.id,petId:r.pet_id,ownerId:r.owner_id,vetId:r.vet_id,date:r.date,time:r.time,type:r.type||"Consulta",notes:r.notes||"",status:r.status||"pending",attended:r.attended}; }
function apptToDb(a){ return {id:a.id,pet_id:a.petId||a.pet_id,owner_id:a.ownerId||a.owner_id,vet_id:a.vetId||a.vet_id,date:a.date,time:a.time,type:a.type||"Consulta",notes:a.notes||"",status:a.status||"pending",attended:a.attended!=null?a.attended:null}; }
function mapReq(r){ if(!r)return null; return {id:r.id,petId:r.pet_id,ownerId:r.owner_id,vetId:r.vet_id,date:r.date,time:r.time,type:r.type||"Consulta",notes:r.notes||"",status:r.status||"pending",ts:r.ts||Date.now()}; }
function reqToDb(q){ return {id:q.id,pet_id:q.petId||q.pet_id,owner_id:q.ownerId||q.owner_id,vet_id:q.vetId||q.vet_id,date:q.date,time:q.time,type:q.type||"Consulta",notes:q.notes||"",status:q.status||"pending",ts:q.ts||Date.now()}; }
function mapNotif(r){ if(!r)return null; return {id:r.id,toId:r.to_id,msg:r.msg,icon:r.icon||"🔔",actionId:r.action_id||"",read:r.read||false,ts:r.ts||Date.now()}; }
function notifToDb(n){ return {id:n.id,to_id:n.toId||n.to_id,msg:n.msg,icon:n.icon||"🔔",action_id:n.actionId||"",read:n.read||false,ts:n.ts||Date.now()}; }
function mapBlocked(r){ return {date:r.date,reason:r.reason||"No disponible"}; }

// ─── SUPABASE REST HELPERS ───────────────────────────────
async function sbAll(table){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?select=*&order=created_at.asc",{headers:supaH()}); return r.ok?await r.json():[];}catch(e){return[];} }
async function sbUpsertRow(table,row){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?on_conflict=id",{method:"POST",headers:Object.assign({},supaH(),{"Prefer":"resolution=merge-duplicates,return=representation"}),body:JSON.stringify([row])}); return r.ok;}catch(e){return false;} }
async function sbUpsertMany(table,rows){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?on_conflict=id",{method:"POST",headers:Object.assign({},supaH(),{"Prefer":"resolution=merge-duplicates,return=representation"}),body:JSON.stringify(rows)}); if(!r.ok){var err=await r.json();console.error("sbUpsertMany error in "+table+":",JSON.stringify(err));} return r.ok;}catch(e){console.error("sbUpsertMany exception:",e);return false;} }
async function sbPatch(table,id,data){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id,{method:"PATCH",headers:supaH(),body:JSON.stringify(data)}); return r.ok;}catch(e){return false;} }
async function sbDel(table,id){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id,{method:"DELETE",headers:supaH()}); return r.ok;}catch(e){return false;} }
async function sbDelWhere(table,col,val){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val),{method:"DELETE",headers:supaH()}); return r.ok;}catch(e){return false;} }

// ─── sGet / sSet: wrappers que mantienen compatibilidad con el App ──
async function sGet(k) {
  try {
    if(k===KEYS.session){ return localStorage.getItem("vc_session")||null; }
    var rows=[];
    if(k===KEYS.users)    { rows=await sbAll("vc_users");    return rows&&rows.length?rows.map(mapUser):null; }
    if(k===KEYS.pets)     { rows=await sbAll("vc_pets");     return rows&&rows.length?rows.map(mapPet):null; }
    if(k===KEYS.records)  { rows=await sbAll("vc_records");  return rows&&rows.length?rows.map(mapRecord):[]; }
    if(k===KEYS.appts)    { rows=await sbAll("vc_appointments"); return rows&&rows.length?rows.map(mapAppt):[]; }
    if(k===KEYS.reqs)     { rows=await sbAll("vc_appt_requests"); return rows&&rows.length?rows.map(mapReq):[]; }
    if(k===KEYS.notifs)   { rows=await sbAll("vc_notifications"); return rows&&rows.length?rows.map(mapNotif):[]; }
    if(k===KEYS.blocked)  { rows=await sbAll("vc_blocked_days"); return rows&&rows.length?rows.map(mapBlocked):[]; }
    return null;
  } catch(e){ console.error("sGet error for key",k,":",e); return null; }
}
async function sSet(k,v) {
  try {
    if(k===KEYS.session){ if(v===null||v==="null") localStorage.removeItem("vc_session"); else localStorage.setItem("vc_session",v); return; }
    if(!Array.isArray(v)) return;
    if(k===KEYS.users)   { await sbUpsertMany("vc_users", v.map(userToDb)); return; }
    if(k===KEYS.pets)    { await sbUpsertMany("vc_pets", v.map(petToDb)); return; }
    if(k===KEYS.records) { await sbUpsertMany("vc_records", v.map(recordToDb)); return; }
    if(k===KEYS.appts)   { await sbUpsertMany("vc_appointments", v.map(apptToDb)); return; }
    if(k===KEYS.reqs)    { await sbUpsertMany("vc_appt_requests", v.map(reqToDb)); return; }
    if(k===KEYS.notifs)  { await sbUpsertMany("vc_notifications", v.map(notifToDb)); return; }
    if(k===KEYS.blocked) { await sbUpsertMany("vc_blocked_days", v.map(mapBlocked)); return; }
  } catch(e){}
}

function calcAge(dob) {
  if(!dob) return null;
  var mo=(new Date().getFullYear()-new Date(dob).getFullYear())*12+new Date().getMonth()-new Date(dob).getMonth();

  if(mo<12) return mo+" mes"+(mo>1?"es":"");
  var y=Math.floor(mo/12), m=mo%12;

function PetCarnet(props) {
  var pet=props.pet, owner=props.owner, C=props.C;

  var sexIcon=pet.sex==="Hembra"?"♀":"♂";
  var speciesHuella={"Perro":"🐾","Gato":"🐾","Ave":"🦶","Conejo":"🐾","Reptil":"🦎","Pez":"🐟","Otro":"🐾"};

  var cardBg=speciesBg[pet.species]||"#6B3E26";

    <div ref={canvasRef} id="pet-carnet" style={{width:340,background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.25)",fontFamily:"'Nunito',sans-serif",margin:"0 auto"}}>

        <div>
          <div style={{color:"#fff",fontWeight:800,fontSize:14,letterSpacing:1}}>{clinicName.toUpperCase()}</div>
          <div style={{color:"rgba(255,255,255,0.8)",fontSize:11}}>Registro de Mascota</div>
        </div>
      </div>
      {/* Body */}
      <div style={{display:"flex",padding:16,gap:14,background:"linear-gradient(135deg,#FDF6EC 0%,#F9E4CC 100%)"}}>
        {/* Photo */}
        <div style={{flexShrink:0}}>
          {pet.photo
            ?<img src={pet.photo} alt={pet.name} style={{width:90,height:110,borderRadius:10,objectFit:"cover",border:"3px solid "+cardBg}}/>
            :<div style={{width:90,height:110,borderRadius:10,background:cardBg+"22",border:"3px solid "+cardBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48}}>{pet.avatar||"🐾"}</div>
          }
          <div style={{textAlign:"center",marginTop:6,fontSize:22}}>{huella}</div>
        </div>
        {/* Info */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:20,color:cardBg,marginBottom:2}}>{pet.name}</div>
          <div style={{fontSize:11,color:"#999",marginBottom:10,fontWeight:600,letterSpacing:0.5}}>{"CARNET DE IDENTIDAD"}</div>
          {[
            ["Especie:",pet.species||"—"],
            ["Raza:",pet.breed||"—"],
            ["Sexo:",( pet.sex||"—")+" "+sexIcon],
            ["Color:",pet.color||"—"],
            ["Nacimiento:",pet.dob?pet.dob.split("-").reverse().join("/"):"—"],

            return (

          <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",fontWeight:600}}>ID MASCOTA</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.9)",fontFamily:"monospace",fontWeight:700}}>{pet.id.toUpperCase()}</div>
        </div>

  );

function CarnetModal(props) {
  var pet=props.pet, owner=props.owner, C=props.C;
  var s1=useState(false); var downloading=s1[0]; var setDownloading=s1[1];
  var s2=useState(""); var msg=s2[0]; var setMsg=s2[1];

  function downloadCarnet() {
    setDownloading(true);
    var el=document.getElementById("pet-carnet");
    if(!el){setMsg("No se pudo generar el carnet.");setDownloading(false);return;}
    // Use html2canvas-style: create a screenshot via DOM serialization
    // Since we can't import html2canvas, use a CSS print approach
    var printWin=window.open("","_blank","width=400,height=600");
    if(!printWin){setMsg("Permite ventanas emergentes para descargar.");setDownloading(false);return;}
    var styles='<style>body{margin:0;padding:20px;font-family:Nunito,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;} @media print{body{background:#fff;padding:0;}}</style>';
    var googleFonts='<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>';
    printWin.document.write("<!DOCTYPE html><html><head><title>Carnet - "+pet.name+"</title>"+googleFonts+styles+"</head><body>"+el.outerHTML+"</body></html>");
    printWin.document.close();
    setTimeout(function(){
      printWin.focus();
      printWin.print();
      setDownloading(false);
      setMsg("Se abrió el carnet para imprimir o guardar como PDF.");
    },1000);
  }

  return (
    <Modal title={"Carnet de "+pet.name} onClose={props.onClose} C={C}>
      <p style={{color:C.textMid,fontSize:13,marginBottom:16,textAlign:"center"}}>Carnet de identidad virtual de tu mascota</p>
      <PetCarnet pet={pet} owner={owner} C={C}/>
      {msg&&<div style={{marginTop:12,padding:"8px 12px",background:C.greenLight,borderRadius:10,fontSize:12,color:C.green,fontWeight:600,textAlign:"center"}}>{msg}</div>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={downloadCarnet} disabled={downloading} full={true} C={C} variant="success">
          {downloading?"Generando...":"📥 Imprimir / Guardar PDF"}
        </Btn>
        <Btn variant="ghost" onClick={props.onClose} full={true} C={C}>Cerrar</Btn>
      </div>
    </Modal>
  );
}

function OwnerItemsDisplay(props) {
  var items=props.items, record=props.record, onUpdateRecord=props.onUpdateRecord, C=props.C;
  var s1=useState(false); var uploading=s1[0]; var setUploading=s1[1];

  async function handleAddFile(itemId,e) {
    var files=Array.from(e.target.files||[]);
    setUploading(true);
    var updatedItems=items.map(function(x){return Object.assign({},x,{files:x.files?x.files.slice():[]});});
    for(var _i=0;_i<files.length;_i++){
      var f=files[_i];
      if(f.size>3*1024*1024){alert("Máximo 3 MB por archivo.");continue;}
      var b64=await toBase64(f);
      var fEntry={id:genId(),file:b64,fileName:f.name};
      updatedItems=updatedItems.map(function(x){return x.id===itemId?Object.assign({},x,{files:x.files.concat([fEntry])}):x;});
    }
    e.target.value="";
    setUploading(false);
    if(onUpdateRecord){
      onUpdateRecord(Object.assign({},record,{items:updatedItems}));
    }
  }

  function handleRemoveFile(itemId,fileId) {
    var updatedItems=items.map(function(x){
      return x.id===itemId?Object.assign({},x,{files:(x.files||[]).filter(function(f){return f.id!==fileId;})}):x;

                        </div>

                        <div style={{background:C.purple,color:"#fff",borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700}}>

        </Field>

      <Field label="Notas" C={C}><textarea rows={2} value={notes} onChange={function(e){setNotes(e.target.value);}} placeholder="Indicaciones..."/></Field>
      <div style={{display:"flex",gap:10,marginTop:8}}><Btn onClick={submit} full={true} C={C} disabled={isBlocked}>Guardar cita</Btn><Btn variant="ghost" onClick={props.onClose} full={true} C={C}>Cancelar</Btn></div>
    </Modal>
  );

                {s.preMeds&&<div style={{gridColumn:"1/-1",background:C.greenLight,borderRadius:8,padding:"6px 10px"}}><div style={{fontSize:10,color:C.textMid,fontWeight:700}}>PREMEDICACIÓN</div><div style={{fontSize:12,color:C.text}}>{s.preMeds}</div></div>}
              </div>
            </div>
          )}
          {/* Intra-op */}
          <div style={{marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:12,color:C.textMid,marginBottom:6,letterSpacing:1}}>{"INTRAOPERATORIO"}</div>
            <div style={{background:C.peach,borderRadius:8,padding:"8px 10px",marginBottom:6}}><div style={{fontSize:10,color:C.textMid,fontWeight:700,marginBottom:2}}>ANESTESIA</div><div style={{fontSize:12,color:C.text}}>{s.anesthesia}</div></div>
            {s.procedure&&<div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:"8px 10px",marginBottom:6}}><div style={{fontSize:10,color:C.textMid,fontWeight:700,marginBottom:2}}>PROCEDIMIENTO</div><div style={{fontSize:12,color:C.text}}>{s.procedure}</div></div>}
            {s.intraItems&&s.intraItems.length>0&&<div style={{marginBottom:6}}>{s.intraItems.map(function(item,i){return <div key={item.id} style={{fontSize:12,color:C.text,padding:"2px 0"}}>{(i+1)+". "+item.text}</div>;})}</div>}
            {s.complications&&s.complications!=="Ninguna"&&<div style={{background:C.redLight,borderRadius:8,padding:"6px 10px"}}><div style={{fontSize:10,color:C.red,fontWeight:700}}>COMPLICACIONES</div><div style={{fontSize:12,color:C.red}}>{s.complications}</div></div>}
          </div>
          {/* Post-op */}
          {(s.postInstructions||s.postMeds||s.nextVisit)&&(
            <div style={{marginBottom:12}}>
              <div style={{fontWeight:800,fontSize:12,color:C.textMid,marginBottom:6,letterSpacing:1}}>{"POST-OPERATORIO"}</div>
              {s.postInstructions&&<div style={{background:C.greenLight,borderRadius:8,padding:"6px 10px",marginBottom:6}}><div style={{fontSize:10,color:C.textMid,fontWeight:700}}>INSTRUCCIONES</div><div style={{fontSize:12,color:C.text}}>{s.postInstructions}</div></div>}
              {s.postMeds&&<div style={{background:C.blueLight,borderRadius:8,padding:"6px 10px",marginBottom:6}}><div style={{fontSize:10,color:C.textMid,fontWeight:700}}>MEDICACIÓN</div><div style={{fontSize:12,color:C.text}}>{s.postMeds}</div></div>}
              {s.nextVisit&&<div style={{display:"inline-block",background:C.blueLight,color:C.blue,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700}}>{"📅 Revisión: "+fmtDate(s.nextVisit)}</div>}
            </div>
          )}
          {/* Files */}
          {s.files&&s.files.length>0&&(
            <div>
              <div style={{fontWeight:800,fontSize:12,color:C.textMid,marginBottom:6,letterSpacing:1}}>{"ARCHIVOS"}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {s.files.map(function(f){
                  var isImg=f.type&&f.type.startsWith("image/");
                  return (
                    <a key={f.id} href={f.file} download={f.fileName} style={{textDecoration:"none"}}>
                      {isImg
                        ?<img src={f.file} alt={f.fileName} style={{width:64,height:64,borderRadius:8,objectFit:"cover",border:"1px solid "+C.border}}/>
                        :<div style={{width:64,height:64,borderRadius:8,background:C.peach,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:"1px solid "+C.border,fontSize:24}}>{"📄"}<span style={{fontSize:9,color:C.textMid,marginTop:2,textAlign:"center",overflow:"hidden",width:56}}>{f.fileName}</span></div>
                      }
                    </a>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function SurgeriesList(props) {
  var surgeries=props.surgeries, pets=props.pets, users=props.users||[], C=props.C;
  var isMobile=useIsMobile();
  var s1=useState(""); var search=s1[0]; var setSearch=s1[1];
  var s2=useState("Todas"); var fspecies=s2[0]; var setFspecies=s2[1];
  var s3=useState("Todos"); var ftype=s3[0]; var setFtype=s3[1];
  var SPECIES=["Todas","Perro","Gato","Ave","Conejo","Reptil","Pez","Otro"];
  var TYPES=["Todos","Castración","Esterilización","Ortopedia","Extracción dental","Masa/Tumor","Cesárea","Oftalmológica","Digestiva","Urológica","Traumatología","Otra"];

  var filtered=surgeries.filter(function(s){
    var pet=byId(pets,s.petId);
    var sr=search.toLowerCase();
    var matchSearch=!sr||(pet&&pet.name.toLowerCase().indexOf(sr)>=0)||s.surgeryType.toLowerCase().indexOf(sr)>=0||s.diagnosis.toLowerCase().indexOf(sr)>=0;
    var matchSpecies=fspecies==="Todas"||(pet&&pet.species===fspecies);
    var matchType=ftype==="Todos"||s.surgeryType===ftype;
    return matchSearch&&matchSpecies&&matchType;
  }).sort(function(a,b){return b.date.localeCompare(a.date);});

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:isMobile?22:26,color:C.brownDark}}>{"Cirugías"}</h2>
          <p style={{color:C.textMid,fontSize:13}}>{surgeries.length+" registradas"}</p>
        </div>
        <Btn C={C} onClick={props.onAdd} disabled={pets.length===0}>{"+ Nueva cirugía"}</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180}}><input placeholder="Buscar por mascota, tipo o diagnóstico..." value={search} onChange={function(e){setSearch(e.target.value);}}/></div>
        <select value={fspecies} onChange={function(e){setFspecies(e.target.value);}} style={{width:"auto",minWidth:110}}>{SPECIES.map(function(s){return <option key={s}>{s}</option>;})}</select>
        <select value={ftype} onChange={function(e){setFtype(e.target.value);}} style={{width:"auto",minWidth:140}}>{TYPES.map(function(t){return <option key={t}>{t}</option>;})}</select>
      </div>
      {filtered.length===0
        ?<div style={{textAlign:"center",padding:40,color:C.textLight}}>
            <div style={{fontSize:48,marginBottom:12}}>🔬</div>
            <p>{surgeries.length===0?"Aún no hay cirugías registradas":"Sin resultados para tu búsqueda"}</p>
          </div>
        :filtered.map(function(s){
            return <SurgeryCard key={s.id} surgery={s} pets={pets} users={users} onEdit={props.onEdit} onDelete={props.onDelete} C={C}/>;
          })
      }
    </div>
  );
}

  var calProps={appointments:appointments,apptReqs:apptReqs,pets:pets,users:users,user:user,onAdd:function(){setModal({type:"apptForm",data:null});},onEdit:function(a){setModal({type:"apptForm",data:a});},onConfirmReq:confirmReq,onConfirmAll:confirmAll,onCancel:cancelAppt,onReschedule:rescheduleAppt,onApprove:approveReq,onReject:rejectReq,onSendReq:sendApptReq,onOpenClinical:openClinical,onConfirmAndAttend:confirmAndAttend,blockedDays:blockedDays,C:C};
  if(!ready) return (
    <div>
      <style>{buildCss(palette(false))}</style>
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#FDF6EC",gap:16}}>
        <div style={{fontSize:48}}>🐾</div>
        <div style={{fontSize:14,color:"#4A6275",fontFamily:"sans-serif"}}>Cargando VetCare...</div>
        <div style={{fontSize:11,color:"#999",fontFamily:"monospace"}}>v2.1</div>
      </div>
    </div>
  );
  if(!user) return (
    <div>
      <style>{buildCss(C)}</style>
      <AuthScreen onLogin={handleLogin} C={C}/>
    </div>
  );
  return (
    <div>
      <style>{buildCss(C)}</style>
      <Toast toasts={toasts} C={C}/>
      <Shell user={user} tab={tab} setTab={function(t){setTab(t);setSelPet(null);setModal(null);}} onLogout={handleLogout} onChangePassword={function(){setShowChangePwd(true);}} notifications={notifs} onMarkRead={markRead} onNotifAction={handleNotifAction} C={C}>
        {isAdmin&&tab==="dashboard"&&<Dashboard pets={pets} records={records} users={users} appointments={appointments} C={C}/>}
        {isAdmin&&tab==="users"&&<AdminUsersPanel users={users} setUsers={setUsers} push={push} C={C}/>}
        {isAdmin&&tab==="blocked"&&<BlockedPanel blockedDays={blockedDays} setBlockedDays={setBlockedDays} push={push} C={C}/>}
        {isAdmin&&tab==="surgeries"&&<SurgeriesList surgeries={surgeries} pets={pets} users={users} onAdd={function(){setSurgeryModal({data:null});}} onEdit={function(s){setSurgeryModal({data:s});}} onDelete={deleteSurgery} C={C}/>}
        {isAdmin&&tab==="calendar"&&<CalendarView {...calProps}/>}
        {isVet&&tab==="dashboard"&&<Dashboard pets={pets} records={records} users={users} appointments={appointments} C={C}/>}
        {isVet&&tab==="pets"&&<PatientsList pets={pets} users={users} records={records} onAdd={function(){setModal({type:"petForm",data:null});}} onEdit={function(p){setModal({type:"petForm",data:p});}} onDelete={deletePet} onCarnet={function(p){var own=byId(users,p.ownerId);setCarnetModal({pet:p,owner:own});}} C={C}/>}
        {isVet&&tab==="records"&&<RecordsList pets={pets} users={users} records={records} onAdd={function(){setModal({type:"recordForm",data:null});}} onEdit={function(r){setModal({type:"recordForm",data:r});}} onDelete={deleteRecord} onUpdateRecord={updateRecord} C={C}/>}
        {isVet&&tab==="surgeries"&&<SurgeriesList surgeries={surgeries} pets={pets} users={users} onAdd={function(){setSurgeryModal({data:null});}} onEdit={function(s){setSurgeryModal({data:s});}} onDelete={deleteSurgery} C={C}/>}
        {isVet&&tab==="calendar"&&<CalendarView {...calProps}/>}
        {isOwner&&tab==="mypets"&&<MyPets pets={ownerPets} records={records} surgeries={surgeries} onSelect={function(p){setSelPet(p);setTab("history");}} onCarnet={function(p){var own=byId(users,p.ownerId);setCarnetModal({pet:p,owner:own});}} C={C}/>}
        {isOwner&&tab==="history"&&<OwnerHistory pets={ownerPets} records={records} selectedPet={selPet} onSelectPet={setSelPet} onUpdateRecord={updateRecord} C={C}/>}
        {isOwner&&tab==="calendar"&&<CalendarView {...Object.assign({},calProps,{pets:ownerPets,apptReqs:apptReqs.filter(function(r){return r.ownerId===user.id;})})}/>}
      </Shell>
      {modal&&modal.type==="petForm"&&<PetForm owners={owners} existing={modal.data} onSave={savePet} onClose={function(){setModal(null);}} C={C} isOwner={isOwner}/>}
      {modal&&modal.type==="recordForm"&&<RecordForm pets={pets} users={users} vetId={user.id} existing={modal.data} onSave={saveRecord} onClose={function(){setModal(null);}} C={C}/>}
      {modal&&modal.type==="apptForm"&&<ApptForm pets={pets} owners={owners} existing={modal.data} allAppts={appointments} blockedDays={blockedList} onSave={saveAppt} onClose={function(){setModal(null);}} C={C} allowBlocked={isVet||isAdmin}/>}
      {pendingAppt&&<ApptActionModal appointment={pendingAppt} pets={pets} users={users} onConfirm={function(a){rescheduleAppt(a,"confirmed");}} onReject={function(a){cancelAppt(a,"owner");}} onClose={function(){setPendingAppt(null);}} C={C}/>}
      {showChangePwd&&user&&<ChangePasswordModal user={user} onSave={changePassword} onClose={function(){setShowChangePwd(false);}} C={C}/>}
      {surgeryModal&&<SurgeryForm pets={pets} users={users} vetId={user.id} existing={surgeryModal.data} onSave={saveSurgery} onClose={function(){setSurgeryModal(null);}} C={C}/>}
      {carnetModal&&<CarnetModal pet={carnetModal.pet} owner={carnetModal.owner} onClose={function(){setCarnetModal(null);}} C={C}/>}
      {clinicalModal&&<ClinicalNoteModal appointment={clinicalModal.appt} pet={clinicalModal.pet} vetId={user.id} existingRecord={clinicalModal.existingRecord} onSave={saveClinicalRecord} onClose={function(){setClinicalModal(null);}} C={C}/>}
    </div>
  );
}

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
      setTimeout(function(){
        var ld=document.getElementById("loading");
        if(ld){ ld.classList.add("hide"); setTimeout(function(){ld.style.display="none";},600); }
      }, 300);

      document.getElementById("loading").innerHTML = "<div style=\"padding:40px;text-align:center;font-family:sans-serif\"><h2 style=\"color:#c00\">Error al cargar VetCare</h2><pre style=\"font-size:12px;color:#333;white-space:pre-wrap\">"+err.message+"</pre></div>";
      console.error("VetCare render error:", err);
    }
  </script>
