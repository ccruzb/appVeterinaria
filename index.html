function mapUser(r){ if(!r)return null; return {id:r.id,role:r.role,firstName:r.first_name,lastName:r.last_name,email:r.email,password:r.password,docType:r.doc_type||"DNI",docNum:r.doc_num||"",phone:r.phone||"",blocked:r.blocked||false}; }
function userToDb(u){ return {id:u.id,role:u.role,first_name:u.firstName||"",last_name:u.lastName||"",email:u.email,password:u.password,doc_type:u.docType||"DNI",doc_num:u.docNum||"",phone:u.phone||"",blocked:u.blocked||false}; }
function mapPet(r){ if(!r)return null; return {id:r.id,ownerId:r.owner_id,name:r.name,species:r.species||"Perro",breed:r.breed||"",sex:r.sex||"Macho",dob:r.dob||"",weight:r.weight||"",color:r.color||"",avatar:r.avatar||"🐾",photo:r.photo||""}; }
function petToDb(p){ return {id:p.id,owner_id:p.ownerId||p.owner_id,name:p.name,species:p.species||"Perro",breed:p.breed||"",sex:p.sex||"Macho",dob:p.dob||"",weight:p.weight||"",color:p.color||"",avatar:p.avatar||"🐾",photo:p.photo||""}; }
function mapRecord(r){ if(!r)return null; return {id:r.id,petId:r.pet_id,vetId:r.vet_id,date:r.date,type:r.type||"Consulta",diagnosis:r.diagnosis||"",treatment:r.treatment||"",notes:r.notes||"",nextVisit:r.next_visit||"",weight:r.weight||"",attended:r.attended,duration:r.duration,items:r.items||[]}; }
function recordToDb(r){ return {id:r.id,pet_id:r.petId||r.pet_id,vet_id:r.vetId||r.vet_id,date:r.date,type:r.type||"Consulta",diagnosis:r.diagnosis||"",treatment:r.treatment||"",notes:r.notes||"",next_visit:r.nextVisit||"",weight:r.weight||"",attended:r.attended!=null?r.attended:null,duration:r.duration||null,items:r.items||[]}; }
function mapAppt(r){ if(!r)return null; return {id:r.id,petId:r.pet_id,ownerId:r.owner_id,vetId:r.vet_id,date:r.date,time:r.time,type:r.type||"Consulta",notes:r.notes||"",status:r.status||"pending",attended:r.attended}; }

function mapReq(r){ if(!r)return null; return {id:r.id,petId:r.pet_id,ownerId:r.owner_id,vetId:r.vet_id,date:r.date,time:r.time,type:r.type||"Consulta",notes:r.notes||"",status:r.status||"pending",ts:r.ts||Date.now()}; }
function reqToDb(q){ return {id:q.id,pet_id:q.petId||q.pet_id,owner_id:q.ownerId||q.owner_id,vet_id:q.vetId||q.vet_id,date:q.date,time:q.time,type:q.type||"Consulta",notes:q.notes||"",status:q.status||"pending",ts:q.ts||Date.now()}; }

// ─── SUPABASE REST HELPERS ───────────────────────────────
async function sbAll(table){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?select=*&order=created_at.asc",{headers:supaH()}); return r.ok?await r.json():[];}catch(e){return[];} }
async function sbUpsertRow(table,row){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?on_conflict=id",{method:"POST",headers:Object.assign({},supaH(),{"Prefer":"resolution=merge-duplicates,return=representation"}),body:JSON.stringify([row])}); return r.ok;}catch(e){return false;} }
async function sbUpsertMany(table,rows){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?on_conflict=id",{method:"POST",headers:Object.assign({},supaH(),{"Prefer":"resolution=merge-duplicates,return=representation"}),body:JSON.stringify(rows)}); if(!r.ok){var err=await r.json();console.error("sbUpsertMany error in "+table+":",JSON.stringify(err));} return r.ok;}catch(e){console.error("sbUpsertMany exception:",e);return false;} }
async function sbPatch(table,id,data){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id,{method:"PATCH",headers:supaH(),body:JSON.stringify(data)}); return r.ok;}catch(e){return false;} }
async function sbDel(table,id){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id,{method:"DELETE",headers:supaH()}); return r.ok;}catch(e){return false;} }
async function sbDelWhere(table,col,val){ try{ var r=await fetch(SUPA_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val),{method:"DELETE",headers:supaH()}); return r.ok;}catch(e){return false;} }

// ─── sGet / sSet: wrappers que mantienen compatibilidad con el App ──
async function sGet(k) {
  try {
    if(k===KEYS.session){ return localStorage.getItem("vc_session")||null; }
    var rows=[];
    if(k===KEYS.users)    { rows=await sbAll("vc_users");    return rows&&rows.length?rows.map(mapUser):null; }
    if(k===KEYS.pets)     { rows=await sbAll("vc_pets");     return rows&&rows.length?rows.map(mapPet):null; }
    if(k===KEYS.records)  { rows=await sbAll("vc_records");  return rows&&rows.length?rows.map(mapRecord):[]; }
    if(k===KEYS.appts)    { rows=await sbAll("vc_appointments"); return rows&&rows.length?rows.map(mapAppt):[]; }
    if(k===KEYS.reqs)     { rows=await sbAll("vc_appt_requests"); return rows&&rows.length?rows.map(mapReq):[]; }
    if(k===KEYS.notifs)   { rows=await sbAll("vc_notifications"); return rows&&rows.length?rows.map(mapNotif):[]; }
    if(k===KEYS.blocked)  { rows=await sbAll("vc_blocked_days"); return rows&&rows.length?rows.map(mapBlocked):[]; }
    return null;
  } catch(e){ console.error("sGet error for key",k,":",e); return null; }
}
async function sSet(k,v) {
  try {
    if(k===KEYS.session){ if(v===null||v==="null") localStorage.removeItem("vc_session"); else localStorage.setItem("vc_session",v); return; }
    if(!Array.isArray(v)) return;
    if(k===KEYS.users)   { await sbUpsertMany("vc_users", v.map(userToDb)); return; }
    if(k===KEYS.pets)    { await sbUpsertMany("vc_pets", v.map(petToDb)); return; }
    if(k===KEYS.records) { await sbUpsertMany("vc_records", v.map(recordToDb)); return; }
    if(k===KEYS.appts)   { await sbUpsertMany("vc_appointments", v.map(apptToDb)); return; }
    if(k===KEYS.reqs)    { await sbUpsertMany("vc_appt_requests", v.map(reqToDb)); return; }
    if(k===KEYS.notifs)  { await sbUpsertMany("vc_notifications", v.map(notifToDb)); return; }
    if(k===KEYS.blocked) { await sbUpsertMany("vc_blocked_days", v.map(mapBlocked)); return; }
  } catch(e){}
}

function fullName(u) { if(!u) return "—"; if(u.firstName && u.lastName) return u.firstName+" "+u.lastName; return u.firstName||u.lastName||u.name||"—"; }
function fmtDate(iso) { if(!iso) return "—"; var p=iso.split("-"); return p[2]+"-"+p[1]+"-"+p[0]; }
function today() { return new Date().toISOString().slice(0,10); }
function genId() { return Math.random().toString(36).slice(2,10); }
function toBase64(f) { return new Promise(function(r,j){ var fr=new FileReader(); fr.onload=function(){r(fr.result);}; fr.onerror=j; fr.readAsDataURL(f); }); }
function calcAge(dob) {
  if(!dob) return null;
  var mo=(new Date().getFullYear()-new Date(dob).getFullYear())*12+new Date().getMonth()-new Date(dob).getMonth();
  if(mo<1) return "recién nacido";
  if(mo<12) return mo+" mes"+(mo>1?"es":"");
  var y=Math.floor(mo/12), m=mo%12;
  return m>0 ? y+" año"+(y>1?"s":"")+" y "+m+" mes"+(m>1?"es":"") : y+" año"+(y>1?"s":"");
}
function sanitizePhone(v) { return v.replace(/\D/g,"").slice(0,9); }
function validateDoc(type,num) {
  if(!num) return "Numero obligatorio.";
  if(type==="DNI") { if(!/^\d{8}$/.test(num)) return "DNI: 8 digitos exactos."; }
  else { if(!/^[A-Z]\d{8}$/.test(num)) return "Formato: letra + 8 digitos."; }
  return "";
}
var TIME_SLOTS = [];
for(var _h=8;_h<19;_h++) { for(var _m=0;_m<60;_m+=30) { TIME_SLOTS.push((_h<10?"0":"")+_h+":"+(_m===0?"00":"30")); } }
function useDark() {
  var mq = typeof window!=="undefined" ? window.matchMedia("(prefers-color-scheme: dark)") : {matches:false};
  var d=useState(mq.matches);
  var dark=d[0], setDark=d[1];
  useEffect(function(){
    var handler=function(e){ setDark(e.matches); };
    mq.addEventListener("change",handler);
    return function(){ mq.removeEventListener("change",handler); };
  },[]);
  return dark;
}
function useIsMobile() {
  var s=useState(window.innerWidth<720);
  var mob=s[0], setMob=s[1];
  useEffect(function(){
    var h=function(){ setMob(window.innerWidth<720); };
    window.addEventListener("resize",h);
    return function(){ window.removeEventListener("resize",h); };
  },[]);
  return mob;
